repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1  # Matches ruff version or close to it
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pydantic-settings, asyncpg, structlog, pytest, pytest-asyncio, mcp]
